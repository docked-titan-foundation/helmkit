name: CI_CD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── GATE 1: Code Quality ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Lint actions Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile.action

  # ─── GATE 2: Versioning (only on main) ────────────────────────────
  release:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !contains(github.actor, 'github-actions[bot]')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Generate bot app token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.TITAN_RELEASER_ID }}
          private-key: ${{ secrets.TITAN_RELEASER_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Import GPG key
        run: echo -n "$TITAN_RELEASER_BASE64_GPG_KEY" | base64 --decode | gpg --batch --import
        env:
          TITAN_RELEASER_BASE64_GPG_KEY: ${{ secrets.TITAN_RELEASER_BASE64_GPG_KEY }}

      - name: Run program that passes the GPG passphrase to the GPG CLI
        run: |
          rm -rf /tmp/gpg.sh
          echo '#!/bin/bash' >> /tmp/gpg.sh
          echo 'gpg --batch --pinentry-mode=loopback --passphrase $TITAN_RELEASER_GPG_PASSPHRASE $@' >> /tmp/gpg.sh
          chmod +x /tmp/gpg.sh

      - name: Configure GPG for automated release commits
        run: |
          git config commit.gpgsign true
          git config user.signingkey $TITAN_RELEASER_GPG_KEY_ID
          git config gpg.program /tmp/gpg.sh
        env:
          TITAN_RELEASER_GPG_KEY_ID: ${{ secrets.TITAN_RELEASER_GPG_KEY_ID }}

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        id: semantic
        env:
          TITAN_RELEASER_GPG_PASSPHRASE: ${{ secrets.TITAN_RELEASER_GPG_PASSPHRASE }}
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          GIT_AUTHOR_NAME: s-release[bot]
          GIT_AUTHOR_EMAIL: ${{ secrets.TITAN_RELEASER_EMAIL }}
          GIT_COMMITTER_NAME: s-release[bot]
          GIT_COMMITTER_EMAIL: ${{ secrets.TITAN_RELEASER_EMAIL }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1)
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

   # ─── GATE 3: Build (single build, capture digest) ───────────────────
  build:
    needs: release
    runs-on: ubuntu-latest
    if: needs.release.result == 'success' && needs.release.outputs.new_release_published == 'true'
    outputs:
      main_image_digest: ${{ steps.build-main.outputs.digest }}
      actions_image_digest: ${{ steps.build-actions.outputs.digest }}
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push main image (by digest)
        id: build-main
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          outputs: type=registry,push-by-digest=true,name-canonical=true
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            APP_VERSION=${{ needs.release.outputs.new_release_version }}
          tags: |
            ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new_release_version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.new_release_version }}
            org.opencontainers.image.title=${{ github.event.repository.name }}

      - name: Build and push actions image (by digest)
        id: build-actions
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.action
          push: true
          outputs: type=registry,push-by-digest=true,name-canonical=true
          tags: |
            ghcr.io/${{ github.repository }}/actions:v${{ needs.release.outputs.new_release_version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.new_release_version }}
            org.opencontainers.image.title=${{ github.event.repository.name }}-actions

      - name: Pull main image for local testing
        run: docker pull ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new_release_version }}

      - name: Pull actions image for local testing
        run: docker pull ghcr.io/${{ github.repository }}/actions:v${{ needs.release.outputs.new_release_version }}

      # ─── GATE 4: Integration Tests ────────────────────────────────
      - name: Run helmkit integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/integration/test-helmkit.sh:/workspace/tests/integration/test-helmkit.sh:ro \
            ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new_release_version }} \
            /bin/bash /workspace/tests/integration/test-helmkit.sh

      - name: Run actions integration tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/integration/test-actions.sh:/workspace/tests/integration/test-actions.sh:ro \
            ghcr.io/${{ github.repository }}/actions:v${{ needs.release.outputs.new_release_version }} \
            /bin/bash /workspace/tests/integration/test-actions.sh

      # ─── GATE 5: Security Scan ──────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new_release_version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Check for critical vulnerabilities
        run: |
          if [ -f trivy-results.sarif ]; then
            CRITICAL_COUNT=$(cat trivy-results.sarif | grep -o '"level":"error"' | wc -l)
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "Found $CRITICAL_COUNT critical vulnerabilities"
              exit 1
            fi
          fi

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ success() && hashFiles('trivy-results.sarif') }}
        with:
          sarif_file: trivy-results.sarif
          category: trivy-main

      - name: Run Trivy on actions image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/actions:v${{ needs.release.outputs.new_release_version }}
          format: sarif
          output: trivy-actions-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Check for critical vulnerabilities in actions image
        run: |
          if [ -f trivy-actions-results.sarif ]; then
            CRITICAL_COUNT=$(cat trivy-actions-results.sarif | grep -o '"level":"error"' | wc -l)
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "Found $CRITICAL_COUNT critical vulnerabilities in actions image"
              exit 1
            fi
          fi

      - name: Upload Trivy results for actions to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ success() && hashFiles('trivy-actions-results.sarif') }}
        with:
          sarif_file: trivy-actions-results.sarif
          category: trivy-actions

      # ─── GATE 6: SBOM ───────────────────────────────────────────────
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:v${{ needs.release.outputs.new_release_version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.release.outputs.new_release_version }}
          path: sbom.spdx.json

      - name: Generate SBOM for actions image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/actions:v${{ needs.release.outputs.new_release_version }}
          format: spdx-json
          output-file: sbom-actions.spdx.json

      - name: Upload actions SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-actions-${{ needs.release.outputs.new_release_version }}
          path: sbom-actions.spdx.json

   # ─── GATE 8: Attest ──────────────────────────────────────────────────
  attest:
    needs: [release, build]
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    permissions:
      contents: write
      attestations: write
      id-token: write
      artifact-metadata: write
      packages: write
    steps:
      - name: Attest main image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ needs.build.outputs.main_image_digest }}
          push-to-registry: true
          create-storage-record: true


      - name: Attest actions image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/actions
          subject-digest: ${{ needs.build.outputs.actions_image_digest }}
          push-to-registry: true
          create-storage-record: true


# ─── GATE 9: Sign ─────────────────────────────────────────────────
  sign:
    needs: [release, build, attest]
    runs-on: ubuntu-latest
    if: needs.build.result == 'success' && needs.attest.result == 'success'
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign main image by digest
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ needs.build.outputs.main_image_digest }}

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom-${{ needs.release.outputs.new_release_version }}

      - name: Attest and sign SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}@${{ needs.build.outputs.main_image_digest }}

          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ needs.build.outputs.main_image_digest }}

      - name: Sign actions image by digest
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/actions@${{ needs.build.outputs.actions_image_digest }}

      - name: Download actions SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom-actions-${{ needs.release.outputs.new_release_version }}

      - name: Attest and sign actions SBOM
        run: |
          cosign attest --yes \
            --predicate sbom-actions.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}/actions@${{ needs.build.outputs.actions_image_digest }}

          cosign sign --yes \
            ghcr.io/${{ github.repository }}/actions@${{ needs.build.outputs.actions_image_digest }}
