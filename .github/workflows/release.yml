name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

  update-version-matrix:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Extract tool versions from Dockerfile
        id: tools
        run: |
          HELM_VERSION=$(grep -oP 'HELM_VERSION=\K[^$]+' Dockerfile | head -1)
          HELMFILE_VERSION=$(grep -oP 'HELMFILE_VERSION=\K[^$]+' Dockerfile | head -1)
          KUBECTL_VERSION=$(grep -oP 'KUBECTL_VERSION=\K[^$]+' Dockerfile | head -1)
          HELM_DIFF_VERSION=$(grep -oP 'HELM_DIFF_VERSION=\K[^$]+' Dockerfile | head -1)
          HELM_SECRETS_VERSION=$(grep -oP 'HELM_SECRETS_VERSION=\K[^$]+' Dockerfile | head -1)
          echo "helm_version=${HELM_VERSION}" >> $GITHUB_OUTPUT
          echo "helmfile_version=${HELMFILE_VERSION}" >> $GITHUB_OUTPUT
          echo "kubectl_version=${KUBECTL_VERSION}" >> $GITHUB_OUTPUT
          echo "helm_diff_version=${HELM_DIFF_VERSION}" >> $GITHUB_OUTPUT
          echo "helm_secrets_version=${HELM_SECRETS_VERSION}" >> $GITHUB_OUTPUT

      - name: Update version matrix
        env:
          VERSION: ${{ steps.version.outputs.version }}
          HELM_VERSION: ${{ steps.tools.outputs.helm_version }}
          HELMFILE_VERSION: ${{ steps.tools.outputs.helmfile_version }}
          KUBECTL_VERSION: ${{ steps.tools.outputs.kubectl_version }}
          HELM_DIFF_VERSION: ${{ steps.tools.outputs.helm_diff_version }}
          HELM_SECRETS_VERSION: ${{ steps.tools.outputs.helm_secrets_version }}
        run: |
          DATE=$(date +%Y-%m-%d)
          # Remove the first line (header) and the last data line (current version) to rebuild
          sed -i '1,3d' README.md
          # Add new entry at the top (after header)
          sed -i "2a| ${VERSION} | ${HELM_VERSION} | ${HELMFILE_VERSION} | ${KUBECTL_VERSION} | ${HELM_DIFF_VERSION} | ${HELM_SECRETS_VERSION} | ${DATE}|" README.md
          cat README.md

      - name: Commit and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: update version matrix for v${VERSION}"
          git push