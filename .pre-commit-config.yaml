---
repos:
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: npx commitlint --edit
        language: system
        stages: [commit-msg]
        pass_filenames: true
      - id: docker-build
        name: Build Docker image
        entry: sh
        args: ["-c", "DOCKER_BUILDKIT=0 docker build -t helmkit-test ."]
        language: system
        stages: [pre-commit]
        files: ^Dockerfile$
      - id: hadolint-main
        name: Lint main Dockerfile
        entry: sh
        args: ["-c", "docker run --rm -i hadolint/hadolint < Dockerfile"]
        language: system
        stages: [pre-commit]
        files: ^Dockerfile$
      - id: integration-test-runtime
        name: Run runtime integration tests
        entry: sh
        args:
          - -c
          - |
            docker build --target runtime -t helmkit-runtime .
            docker run --rm -v ${PWD}/tests:/workspace/tests:ro helmkit-runtime \
              bash /workspace/tests/integration/test-helmkit.sh
        language: system
        stages: [pre-commit]
        always_run: true
      - id: integration-test-actions
        name: Run actions integration tests
        entry: sh
        args:
          - -c
          - |
            docker build --target actions -t helmkit-actions .
            docker run --rm -v ${PWD}/tests:/workspace/tests:ro helmkit-actions \
              bash /workspace/tests/integration/test-actions.sh
        language: system
        stages: [pre-commit]
        always_run: true
      - id: release-config-validate
        name: Validate semantic release configuration
        entry: ./scripts/validate-release-config.sh
        language: system
        stages: [pre-commit]
        files: ^(\.releaserc|scripts/update-versions\.sh|README\.md|action\.yml|scripts/validate-release-config\.sh)$
        pass_filenames: false
