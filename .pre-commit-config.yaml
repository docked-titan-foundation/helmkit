---
repos:
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: npx commitlint --edit
        language: system
        stages: [commit-msg]
        pass_filenames: true
      - id: docker-build
        name: Build Docker image
        entry: sh
        args: ["-c", "DOCKER_BUILDKIT=0 docker build -t helmkit-test ."]
        language: system
        stages: [pre-commit]
        files: ^Dockerfile$
      - id: docker-action-build
        name: Build Docker Actions image
        entry: sh
        args: ["-c", "DOCKER_BUILDKIT=0 docker build -t helmkit-action-test -f Dockerfile.action ."]
        language: system
        stages: [pre-commit]
        files: ^Dockerfile.action$
      - id: hadolint-main
        name: Lint main Dockerfile
        entry: sh
        args: ["-c", "docker run --rm -i hadolint/hadolint < Dockerfile"]
        language: system
        stages: [pre-commit]
        files: ^Dockerfile$
      - id: hadolint-actions
        name: Lint actions Dockerfile
        entry: sh
        args: ["-c", "docker run --rm -i hadolint/hadolint < Dockerfile.action"]
        language: system
        stages: [pre-commit]
        files: ^Dockerfile.action$
      - id: integration-test
        name: Run integration tests
        entry: sh
        args: ["-c", "docker run --rm -v ./tests/integration/test-helmkit.sh:/workspace/tests/integration/test-helmkit.sh:ro helmkit-test /bin/bash /workspace/tests/integration/test-helmkit.sh && ./tests/integration/test-actions.sh"]
        language: system
        stages: [pre-commit]
        always_run: true
      - id: release-config-validate
        name: Validate semantic release configuration
        entry: ./scripts/validate-release-config.sh
        language: system
        stages: [pre-commit]
        files: ^(\.releaserc|scripts/update-versions\.sh|README\.md|action\.yml|scripts/validate-release-config\.sh)$
        pass_filenames: false
